apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      tolerations:
        - key: "no-worker"
          operator: "Exists"
          effect: "NoExecute"
        - key: "t1cloud.com/smb-dfs-kernel-instability"
          operator: "Exists"
          effect: "NoExecute"
      containers:
        - name: main
          image: nginx:stable
          imagePullPolicy: IfNotPresent
